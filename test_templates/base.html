<!doctype html> # Page made to test mutation fingerprinting
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Fingerprint Viewer{% endblock %}</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #5f6b85;
        --border: #d7dfec;
        --accent: #1f5eff;
        --err: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 32px auto;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 10px 30px rgba(31, 47, 86, 0.08);
      }

      .muted {
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .badge.err {
        background: #fef3f2;
        color: var(--err);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <main>{% block content %}{% endblock %}</main>
    {% block scripts_extra %}{% endblock %}
  </body>
</html>
